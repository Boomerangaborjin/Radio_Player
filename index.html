<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boomerang ve Aborjin Radyo</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  /* İŞTE BURASI: Loş Radyo Stüdyosu Arka Planı */
  background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
              url('https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=1974&auto=format&fit=crop');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  text-align:center;
}
h1 {
  margin-bottom:20px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
}
.player-box {
  background: rgba(26, 26, 26, 0.85); /* Player biraz daha şeffaf ve cam gibi */
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.9);
  text-align:center;
  width:90%;
  max-width:450px;
  position:relative;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
}
audio {
  width:100%;
  display:none; 
}
.play-button {
  display:inline-block;
  margin-top:20px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:linear-gradient(145deg,#ffcc00,#ffaa00);
  border:none;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,204,0,0.5);
  transition:0.3s;
  font-size:2em;
  color:#000;
}
.play-button:hover {
  transform: scale(1.1);
  box-shadow:0 0 30px rgba(255,204,0,0.8);
}
.wave {
  margin-top:15px;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:4px;
}
.wave div {
  width:5px;
  height:10px;
  background:#ffcc00;
  animation: waveAnim 1s infinite ease-in-out;
}
.wave div:nth-child(1){animation-delay:0s;}
.wave div:nth-child(2){animation-delay:0.1s;}
.wave div:nth-child(3){animation-delay:0.2s;}
.wave div:nth-child(4){animation-delay:0.3s;}
.wave div:nth-child(5){animation-delay:0.4s;}
@keyframes waveAnim {
  0%,100%{height:10px;}
  50%{height:35px;}
}
.message {
  margin-top:20px;
  font-size:0.9em;
  color:#eee;
}
.message p {
  margin:10px 0;
}
#suggest {
  font-weight:bold;
  color:#ffcc00;
  font-size:1.1em;
  margin-top:10px;
  animation: pulse 1.5s infinite alternate;
  display:block;
}
@keyframes pulse {
  0% {transform: scale(1); opacity: 0.8;}
  100% {transform: scale(1.05); opacity: 1;}
}
.share-buttons {
  margin-top:20px;
}
.share-buttons a {
  display:inline-block;
  margin:8px;
  padding:10px 15px;
  border-radius:50%;
  text-decoration:none;
  font-size:14px;
  font-weight:bold;
  transition:0.3s;
  text-align:center;
}
.whatsapp { background:#25D366; color:white; }
.facebook { background:#1877F2; color:white; }
.twitter { background:#000000; color:white; }
.instagram { background:#E1306C; color:white; }
.share-buttons a:hover { 
  transform: scale(1.1);
}
.footer {
  margin-top:20px;
  font-size:0.9em;
  color:#ccc;
}
</style>
</head>
<body>
<h1>🎧 Boomerang ve Aborjin</h1>
<div class="player-box">
  <audio id="radio-stream" preload="none">
    <source src="https://radyoserver1.okeylisans.com:9440/stream" type="audio/mpeg">
  </audio>
  <button class="play-button" id="play-btn">▶</button>
  <div class="wave">
    <div></div><div></div><div></div><div></div><div></div>
  </div>
  <div class="message">
    <p>Player Çalmazsa Play Tuşuna Tıklayın.</p>
    <p><a href="https://wa.me/905354363816?text=🎧%20İSTEK%20HATTI" target="_blank" style="color:#25D366; text-decoration:none; font-weight:bold;">İSTEK HATTI</a></p>
    <p id="suggest">BİZİ ÖNERİN!</p>
  </div>
  <div class="share-buttons">
    <a class="whatsapp" target="_blank" href="https://wa.me/?text=Dinle">W</a>
    <a class="facebook" target="_blank" href="https://facebook.com">F</a>
    <a class="twitter" target="_blank" href="https://twitter.com">X</a>
    <a class="instagram" target="_blank" href="https://instagram.com">I</a>
  </div>
</div>
<div class="footer">
  &copy; 2026 Boomerang ve Aborjin Radyo
</div>
<script>
const audio = document.getElementById('radio-stream');
const playBtn = document.getElementById('play-btn');
playBtn.addEventListener('click', ()=>{
  if(audio.paused){
    audio.play();
    playBtn.textContent = '⏸';
  } else {
    audio.pause();
    playBtn.textContent = '▶';
  }
});
</script>
</body>
</html>
